version: 2

project_name: shellshare

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: shellshare
    ldflags:
      - -s -w
      - -X github.com/shellshare/cli/cmd.Version={{.Version}}
      - -X github.com/shellshare/cli/cmd.CommitSHA={{.ShortCommit}}
      - -X github.com/shellshare/cli/cmd.BuildDate={{.Date}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: shellshare
    name: cli
  draft: true
